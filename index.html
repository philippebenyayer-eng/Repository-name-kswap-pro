<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASK CASH</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.logo{
width:220px;
display:block;
margin:20px auto;
border-radius:20px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
margin-bottom:15px;
border:1px solid #ff008a;
}

.balance{
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.token{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #222;
}

.btn{
width:100%;
padding:15px;
background:#ff008a;
border:none;
color:white;
font-size:18px;
border-radius:15px;
cursor:pointer;
margin-top:10px;
}

.swap-box{
display:flex;
flex-direction:column;
gap:10px;
}

input,select{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:15px 0;
border-top:1px solid #333;
}

.bottom-nav a{
color:white;
text-decoration:none;
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<img src="B71822F6-8B75-41A2-88BE-0D7AF4F79B55.png" class="logo">

<div class="card">
<div class="balance">12 500 KDollar</div>
<button class="btn">Connect Wallet</button>
</div>

<div class="card">
<h2>Portefeuille</h2>

<div class="token">
<span>KDollar</span>
<span>12 500 KD</span>
</div>

<div class="token">
<span>USDT</span>
<span>250 USDT</span>
</div>

<div class="token">
<span>ETH</span>
<span>0.15 ETH</span>
</div>

</div>

<div class="card">
<h2>Swap</h2>

<div class="swap-box">

<input type="number" placeholder="Montant">

<select>
<option>KDollar</option>
<option>USDT</option>
<option>ETH</option>
<option>BNB</option>
</select>

<select>
<option>USDT</option>
<option>KDollar</option>
<option>ETH</option>
<option>BNB</option>
</select>

<button class="btn">
Échanger
</button>

</div>
</div>

</div>

<div class="bottom-nav">
<a href="#">🏠<br>Accueil</a>
<a href="#">🔄<br>Swap</a>
<a href="#">💳<br>Paiements</a>
<a href="#">👛<br>Wallet</a>
</div>

</body>
</html>
