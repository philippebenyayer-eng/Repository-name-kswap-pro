<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASK CASH</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url('B71822F6-8B75-41A2-88BE-0D7AF4F79B55.png') center center no-repeat;
background-size:80%;
opacity:.08;
pointer-events:none;
}

#splash{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
animation:hideSplash 3s forwards;
}

#splash img{
width:220px;
animation:glow 2s infinite alternate;
}

#splash h1{
margin-top:20px;
color:#ff008a;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

@keyframes hideSplash{
0%,80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

.app{
padding:20px;
height:100vh;
overflow-y:auto;
}

.balance{
text-align:center;
margin-top:30px;
margin-bottom:20px;
}

.balance h2{
color:#ff008a;
font-size:32px;
}

.carousel{
display:flex;
gap:20px;
overflow-x:auto;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
padding-bottom:20px;
}

.carousel::-webkit-scrollbar{
display:none;
}

.card{
min-width:280px;
height:180px;
background:rgba(255,255,255,.08);
border:1px solid #ff008a;
border-radius:25px;
padding:20px;
scroll-snap-align:center;
backdrop-filter:blur(10px);
}

.card h3{
color:#ff008a;
margin-bottom:15px;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:15px;
background:#ff008a;
color:white;
font-size:16px;
margin-top:10px;
}

.tokens{
display:flex;
gap:10px;
margin-top:20px;
overflow-x:auto;
}

.token{
padding:10px 15px;
background:#111;
border:1px solid #ff008a;
border-radius:15px;
white-space:nowrap;
}
</style>
</head>

<body>

<div id="splash">
<img src="B71822F6-8B75-41A2-88BE-0D7AF4F79B55.png">
<h1>WELCOME TO MASK CASH</h1>
</div>

<div class="app">

<div class="balance">
<h2>K$ 12,500</h2>
<p>ETH 0.15</p>
</div>

<div class="carousel">

<div class="card">
<h3>Wallet</h3>
<p>Connect your wallet</p>
<button class="btn">Connect Wallet</button>
</div>

<div class="card">
<h3>Send</h3>
<p>Send K$ tokens</p>
</div>

<div class="card">
<h3>Receive</h3>
<p>Receive payments</p>
</div>

<div class="card">
<h3>Swap</h3>
<p>Swap assets</p>
</div>

<div class="card">
<h3>History</h3>
<p>Transactions history</p>
</div>

</div>

<div class="tokens">
<div class="token">K$</div>
<div class="token">BTC</div>
<div class="token">ETH</div>
<div class="token">USDT</div>
<div class="token">USDC</div>
</div>

</div>

</body>
</html>
