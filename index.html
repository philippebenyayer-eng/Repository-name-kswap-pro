<!DOCTYPE html>
<html lang="fr">
<head>

<title>MASK CASH</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("B71822F6-8B75-41A2-88BE-0D7AF4F79B55.png") center center no-repeat;

opacity:.15;

}

}

.logo{
width:220px;
display:block;
margin:20px auto;
filter:drop-shadow(0 0 20px #ff008a);
}

.wallet-card{
background:rgba(20,20,20,.9);
border-radius:25px;
padding:20px;
box-shadow:0 0 25px rgba(255,0,138,.25);
}

.balance{
font-size:48px;
font-weight:bold;
margin:15px 0;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:80px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
}

.bottom-nav a{
color:#ff008a;
text-decoration:none;
text-align:center;
font-size:12px;
}

.bottom-nav span{
display:block;

<div class="container">
