<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASK CASH</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url('B71822F6-8B75-41A2-88BE-0D7AF4F79B55.png') center center no-repeat;
background-size:60%;
opacity:.12;
pointer-events:none;
z-index:-1;
}

.slider{
display:flex;
width:100vw;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
scroll-behavior:smooth;
}

.slider::-webkit-scrollbar{
display:none;
}

.slide{
min-width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
scroll-snap-align:start;
}

.card{
width:90%;
max-width:500px;
background:rgba(255,255,255,.05);
border:1px solid #ff008a;
border-radius:30px;
padding:30px;
backdrop-filter:blur(15px);
box-shadow:0 0 25px rgba(255,0,138,.3);
text-align:center;
}

h1{
color:#ff008a;
margin-bottom:20px;
font-size:36px;
}

h2{
color:#ff008a;
margin-bottom:20px;
}

.balance{
font-size:42px;
font-weight:bold;
margin-bottom:15px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:20px;
background:#ff008a;
color:white;
font-size:18px;
margin-top:15px;
}

input,select{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
background:#111;
color:white;
}

.qr{
width:220px;
height:220px;
background:white;
margin:auto;
border-radius:20px;
}

.token{
background:#111;
padding:12px;
margin-top:10px;
border-radius:15px;
border:1px solid #ff008a;
}

.hint{
margin-top:20px;
opacity:.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="slider">

<!-- PORTFOLIO -->

<section class="slide">
<div class="card">

<h1>MASK CASH</h1>

<div class="balance">
K$ 12,500
</div>

<p>ETH 0.15</p>

<button class="btn">
Connect Wallet
</button>

<div class="hint">
Swipe →
</div>

</div>
</section>

<!-- SEND -->

<section class="slide">
<div class="card">

<h2>SEND</h2>

<input placeholder="Recipient Address">

<input placeholder="Amount">

<button class="btn">
Send K$
</button>

<div class="hint">
← Swipe →
</div>

</div>
</section>

<!-- RECEIVE -->

<section class="slide">
<div class="card">

<h2>RECEIVE</h2>

<div class="qr"></div>

<p style="margin-top:20px">
Your Wallet Address
</p>

<button class="btn">
Copy Address
</button>

<div class="hint">
← Swipe →
</div>

</div>
</section>

<!-- SWAP -->

<section class="slide">
<div class="card">

<h2>SWAP</h2>

<input placeholder="Amount">

<select>
<option>K$</option>
<option>BTC</option>
<option>ETH</option>
<option>USDT</option>
<option>USDC</option>
</select>

<select>
<option>BTC</option>
<option>ETH</option>
<option>USDT</option>
<option>USDC</option>
<option>K$</option>
</select>

<button class="btn">
Swap
</button>

<div class="hint">
← Swipe →
</div>

</div>
</section>

<!-- HISTORY -->

<section class="slide">
<div class="card">

<h2>HISTORY</h2>

<div class="token">
+250 K$
</div>

<div class="token">
-50 K$
</div>

<div class="token">
+0.10 ETH
</div>

<div class="hint">
← Swipe
</div>

</div>
</section>

</div>

</body>
</html>
